<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coupe du Monde Foot 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'], oswald: ['Oswald', 'sans-serif'] },
        colors: {
          // Thème "Coupe du Monde" — vert pelouse + or trophée (volontairement différent du bleu/or de Pastis Pronos)
          navy: { 900: '#081C12', 800: '#0F3320', 700: '#1C4A30' },
          pastis: { 500: '#E7B448', 600: '#C79730' }
        }
      }
    }
  };
</script>
<style>
  html, body { -webkit-tap-highlight-color: transparent; }
  body {
    background:
      radial-gradient(circle at 15% -10%, rgba(231,180,72,0.14), transparent 42%),
      radial-gradient(circle at 100% 15%, rgba(28,74,48,0.55), transparent 55%),
      #081C12;
    position: relative;
  }
  body::before {
    content: '🏆';
    position: fixed;
    font-size: 46vw;
    line-height: 1;
    opacity: 0.04;
    top: -8vw;
    right: -10vw;
    z-index: 0;
    pointer-events: none;
    transform: rotate(-12deg);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 64px);
    z-index: 0;
    pointer-events: none;
  }
  header, main, footer { position: relative; z-index: 1; }
  .card { background: #0F3320; border: 1px solid #1C4A30; border-radius: 0.9rem; }
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none; } }
  .loader { border: 4px solid #0F3320; border-top: 4px solid #E7B448; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-navy-900 text-white font-sans antialiased min-h-screen">

<header class="bg-navy-900/90 backdrop-blur-md border-b border-navy-700/50 sticky top-0 z-40 shadow-lg">
  <div class="max-w-lg mx-auto px-3 pt-3 pb-2 flex items-center justify-between gap-2">
    <div id="logo-left-wrap" class="hidden flex-shrink-0 w-12 h-12 rounded-xl bg-white flex items-center justify-center shadow p-1.5">
      <img id="logo-left" class="w-full h-full object-contain" alt="Logo Lykos">
    </div>
    <h1 class="flex-1 text-center font-oswald font-black uppercase tracking-wide leading-tight">
      <span class="block text-pastis-500 text-base">🏆 Coupe du Monde</span>
      <span class="block text-white text-sm">Foot 5</span>
    </h1>
    <div id="logo-right-wrap" class="hidden flex-shrink-0 w-12 h-12 rounded-xl bg-white flex items-center justify-center shadow p-1.5">
      <img id="logo-right" class="w-full h-full object-contain" alt="Logo complexe">
    </div>
  </div>
  <div class="max-w-lg mx-auto px-3 pb-2 flex justify-center">
    <button onclick="refreshData()" class="bg-pastis-500 hover:bg-pastis-600 text-navy-900 text-xs font-bold px-3 py-1.5 rounded-full shadow transition flex items-center gap-1.5">
      🔄 Actualiser
    </button>
  </div>
  <div class="max-w-lg mx-auto px-3 pb-3">
    <div class="flex bg-navy-900/60 rounded-xl p-1 shadow-inner border border-navy-700/50 gap-1">
      <button data-tab="planning" onclick="switchTab('planning')" class="tab-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition">📅 Planning</button>
      <button data-tab="groupes" onclick="switchTab('groupes')" class="tab-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition">📊 Groupes</button>
      <button data-tab="finale" onclick="switchTab('finale')" class="tab-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition">🏆 Finale</button>
      <button data-tab="equipe" onclick="switchTab('equipe')" class="tab-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition">👤 Équipe</button>
    </div>
  </div>
</header>

<main class="max-w-lg mx-auto p-3 pb-16">

  <div id="loader" class="flex flex-col items-center justify-center py-20">
    <div class="loader mb-4"></div>
    <p class="text-gray-400 text-sm">Chargement du tournoi...</p>
  </div>

  <div id="error-box" class="hidden bg-red-900/30 border border-red-700 text-red-200 text-sm p-4 rounded-xl"></div>

  <div id="retard-banner" class="hidden text-center text-[11px] text-navy-900 bg-pastis-500 font-bold rounded-lg px-3 py-2 mb-3"></div>

  <section id="view-planning" class="hidden fade-in space-y-3"></section>

  <section id="view-groupes" class="hidden fade-in space-y-5"></section>

  <section id="view-finale" class="hidden fade-in space-y-3">
    <div class="flex bg-navy-900/60 rounded-xl p-1 shadow-inner border border-navy-700/50 gap-1">
      <button data-finale-view="chrono" onclick="switchFinaleView('chrono')" class="finale-view-btn flex-1 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-lg transition">🕐 Chronologique</button>
      <button data-finale-view="tableau" onclick="switchFinaleView('tableau')" class="finale-view-btn flex-1 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-lg transition">🏆 Tableau</button>
    </div>
    <div id="finale-chrono" class="space-y-3"></div>
    <div id="finale-tableau" class="hidden"></div>
  </section>

  <section id="view-equipe" class="hidden fade-in space-y-3">
    <select id="select-equipe" onchange="renderEquipe()" class="w-full bg-navy-800 border border-navy-700 text-white rounded-lg px-3 py-3 font-bold text-base focus:outline-none focus:ring-1 focus:ring-pastis-500">
      <option value="">-- Choisir une équipe --</option>
    </select>
    <div id="equipe-matches"></div>
  </section>

  <p id="last-update" class="text-center text-[10px] text-gray-500 mt-8"></p>

</main>

<script>
// ⚠️ Colle ici l'URL de ton Web App Apps Script (se termine par /exec)
const API_URL = 'https://script.google.com/macros/s/AKfycbw-stEBU968EXh38SxefJCJlLDMuJpOKbk_fGMuXMPP3fGX7xln5wPCrpwPHPaM9tNNcA/exec';

// ⚠️ Colle ici tes URLs de logos (même méthode que sur Pastis Pronos :
// héberge l'image sur Google Drive, partage "Tout le monde avec le lien",
// puis utilise https://lh3.googleusercontent.com/d/TON_ID_FICHIER)
const LOGO_LEFT_URL = 'https://lh3.googleusercontent.com/d/1Nf3045OYK-sjzYePgf_WzCkGV3dwrxy8';  // logo Lykos
const LOGO_RIGHT_URL = 'https://lh3.googleusercontent.com/rd-d/ALs6j_FgjmA0rCzx_K7oHRKPxj4M98yICz3L-NYfmYLYxK65bWG2DHgSZk1eQmrcB16VmdhTaBoex5d6LB31SXIAiqXdvsT5qqNmQNTW6BNEL3e9JHfL-soU04P-7-8EwVosZr70TDeY7ewxyAcdTikIgzpOXGkFHqcSgaAAZ2SggsyKjFvEYRZlwI_51OHY4IGkMkPHqnqTftJdBx0_Vf7RLtqYfrJo6rUc4j6Y7QYkt2LsBoCIaGc5ABrl_UQ6p0Hbnlbb4_09pR6Gs0zi0JR7FzKpawd0ZkMA4aTu25mV1fXVi-cQQKEMOARmPia4fKbiMqizp0wD1lauwdWvPAgSawVRaZqG-jKNexGZTsPn6hAOuNpj-isZ1H56OwcYG52IbXqlpQFZiwKqUDugqW6gkGFtbmDIpj2T35nhLwF8vXQynbTEsVh2L53H-6Jn5liAwy7oxtsodnO0GjODoQeHXZUGC77gTDeK5wuaVUjTv0mgyR53h5yBCtShxf0xGSO5m9iNDCNZ_9XGh_cBpiC57JONrkKRM0b8qCbm0PGOKS9jvDsJ9Y4J_LeRrFqWBnwE9TQIZkttlD0E9rybUDh8cyJkJFAVWf6rgJc5ru-tM34xop1XTybgv3w-Fd_jGmn7jDm4PWn6QaYxLmp32iOOY_2N3Xko-X5iEL1B5fos5d-f9kdW3QvCaQxT-f6shFPvlN6CBr8Rne6noBPNIAktPxnfzbs9c90h4p_ab6Nb5TZjVsqGquriWYHD1yO9P9BNSawWlbb8tSqslBfa5dZMEoPYlPfp2nqySoENDzZ5XewAAf521vKqE_LJogQfqfaT4nH4K8N_u_zhSCf3QFmNJjfrcv3s7fQ67pvyUoBlNdbjKNtU2K98qX2aavu9nojUZXh_c5mR-olI0jXpvhJbqH9903EN4EQjEI1-YYj-IbjQmfOLAgRmXuNCylioESMyRQ8MUUO5PP9z8_OpBomtRwigjvpeVnvwTOZLyKH1Azj_JcY0uWBYhNxouYg8dI3bZkoeQOwOTRZmJy2fudEf_ns-hyw81qMRinIiEdkIAPxc28IR3CgUcrI-fXLoAGI7TWKh13Dgw1q2oBy0HzHv=s1600'; // logo du complexe futsal (Salon-de-Provence)


  let appData = { planning: [], groupes: {} };
  let currentTab = 'planning';
  let journeeMap = {};

  function buildJourneeMap() {
    journeeMap = {};
    const times = [...new Set(appData.planning.map(m => formatHeure(m.datetime)))]
      .filter(Boolean)
      .sort((a, b) => a.localeCompare(b));
    times.forEach((t, i) => { journeeMap[t] = i + 1; });
  }

  const FLAGS = {
    'Italie': '🇮🇹', 'Allemagne': '🇩🇪', 'Portugal': '🇵🇹', 'France': '🇫🇷', 'Espagne': '🇪🇸',
    'Belgique': '🇧🇪', 'Brésil': '🇧🇷', 'Pays-Bas': '🇳🇱', 'Maroc': '🇲🇦', 'Croatie': '🇭🇷',
    'Colombie': '🇨🇴', 'Sénégal': '🇸🇳', 'Angleterre': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Argentine': '🇦🇷'
  };
  function flag(nom) { return FLAGS[nom] || ''; }

  // Légende "qui va où" après les poules — dépend du nombre d'équipes du groupe
  const LEGENDES_GROUPE = {
    5: "1er, 2e, 3e → Quarts de finale · 4e → Demi conso · 5e → Barrage consolante",
    4: "1er, 2e → Quarts de finale · 3e, 4e → Barrage consolante"
  };

  // Couleurs fixes pour les terrains connus (identité visuelle voulue),
  // et palette de secours si un nouveau terrain est ajouté plus tard.
  const TERRAIN_COLORS_FIXED = {
    'anfield': '#C8102E',      // rouge Liverpool
    'vélodrome': '#3FA9E0',    // bleu ciel OM
    'velodrome': '#3FA9E0',
    'camp nou': '#FFD400'      // jaune catalan
  };
  const TERRAIN_PALETTE = ['#9B6BD1', '#4BBF8C', '#D14F8C', '#6B8ED1', '#E8834B'];
  function terrainColor(nom) {
    if (!nom) return TERRAIN_PALETTE[0];
    const key = nom.toString().trim().toLowerCase();
    if (TERRAIN_COLORS_FIXED[key]) return TERRAIN_COLORS_FIXED[key];
    let h = 0;
    for (let i = 0; i < nom.length; i++) h = (h * 31 + nom.charCodeAt(i)) >>> 0;
    return TERRAIN_PALETTE[h % TERRAIN_PALETTE.length];
  }

  let pollTimer = null;
  const POLL_INTERVAL_MS = 20000; // 20 secondes

  window.onload = () => {
    if (LOGO_LEFT_URL) { document.getElementById('logo-left').src = LOGO_LEFT_URL; document.getElementById('logo-left-wrap').classList.remove('hidden'); }
    if (LOGO_RIGHT_URL) { document.getElementById('logo-right').src = LOGO_RIGHT_URL; document.getElementById('logo-right-wrap').classList.remove('hidden'); }
    fetchData(true);
    setupPolling();
  };

  // Si le téléphone se verrouille ou qu'on change d'appli, les navigateurs
  // mettent les timers en pause. Dès qu'on revient sur la page, on force un
  // rafraîchissement immédiat pour ne jamais afficher de données périmées.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      fetchData(false);
      setupPolling();
    }
  });

  function setupPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => fetchData(false), POLL_INTERVAL_MS);
  }

  function fetchData(showLoader) {
    if (!API_URL) {
      showError("L'URL de l'API n'est pas configurée. Ouvre index.html et remplace API_URL par l'URL de ton déploiement Apps Script.");
      return;
    }
    if (showLoader) document.getElementById('loader').classList.remove('hidden');
    // cache: 'no-store' évite qu'un navigateur mobile (Safari iOS en particulier)
    // ne renvoie une ancienne réponse mise en cache au lieu d'interroger la Sheet.
    fetch(API_URL + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        if (data.error) { if (showLoader) showError('Erreur côté script : ' + data.message); return; }
        appData = data;
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('error-box').classList.add('hidden');
        renderAll();
        switchTab(currentTab);
        const banner = document.getElementById('retard-banner');
        if (data.retardMinutes > 0) {
          banner.textContent = '⏱️ Retard actuel : +' + data.retardMinutes + ' min (horaires à venir décalés en conséquence)';
          banner.classList.remove('hidden');
        } else {
          banner.classList.add('hidden');
        }
        const d = new Date(data.updated);
        document.getElementById('last-update').textContent = '🔄 Mise à jour auto · dernière donnée : ' + d.toLocaleTimeString('fr-FR');
      })
      .catch(err => { if (showLoader) showError('Impossible de contacter le tournoi. Vérifie ta connexion. (' + err.message + ')'); });
  }

  function refreshData() {
    fetchData(true);
    setupPolling();
  }

  function showError(msg) {
    document.getElementById('loader').classList.add('hidden');
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.remove('hidden');
  }

  function switchTab(tab) {
    currentTab = tab;
    ['planning', 'groupes', 'finale', 'equipe'].forEach(t => {
      document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
    });
    document.querySelectorAll('.tab-btn').forEach(b => {
      const active = b.dataset.tab === tab;
      b.classList.toggle('bg-pastis-500', active);
      b.classList.toggle('text-navy-900', active);
      b.classList.toggle('font-black', active);
      b.classList.toggle('text-gray-400', !active);
    });
  }

  const TERRAIN_ORDER = { 'vélodrome': 1, 'velodrome': 1, 'anfield': 2, 'camp nou': 3 };
  function terrainRank(nom) {
    if (!nom) return 99;
    const key = nom.toString().trim().toLowerCase();
    return TERRAIN_ORDER[key] !== undefined ? TERRAIN_ORDER[key] : 99;
  }
  function compareMatches(a, b) {
    const h = formatHeure(a.datetime).localeCompare(formatHeure(b.datetime));
    if (h !== 0) return h;
    return terrainRank(a.location) - terrainRank(b.location);
  }

  let finaleView = 'chrono';
  function switchFinaleView(v) {
    finaleView = v;
    document.getElementById('finale-chrono').classList.toggle('hidden', v !== 'chrono');
    document.getElementById('finale-tableau').classList.toggle('hidden', v !== 'tableau');
    document.querySelectorAll('.finale-view-btn').forEach(b => {
      const active = b.dataset.finaleView === v;
      b.classList.toggle('bg-pastis-500', active);
      b.classList.toggle('text-navy-900', active);
      b.classList.toggle('font-black', active);
      b.classList.toggle('text-gray-400', !active);
    });
  }

  // Structure des 3 tableaux de la phase finale (par id de match ou par nom de phase)
  const BRACKET_DEFS = [
    { title: '🏆 Tableau Principal', rounds: [
        { label: 'Quarts de finale', ids: ['QF1', 'QF2', 'QF3', 'QF4'] },
        { label: 'Demi-finales', ids: ['DP1', 'DP2'] },
        { label: 'Finale', phases: ['Finale'] },
        { label: 'Petite finale (3e place)', phases: ['Petite finale'] }
    ]},
    { title: '🥈 Tableau Consolante', rounds: [
        { label: 'Barrages', ids: ['BAR1', 'BAR2'] },
        { label: 'Demi conso', ids: ['DC1', 'DC2'] },
        { label: 'Finale conso', phases: ['Finale conso'] },
        { label: 'Petite finale conso', phases: ['Petite finale conso'] }
    ]},
    { title: '📊 Classement', rounds: [
        { label: 'Classement (5e à 8e)', phases: ['Classement'] },
        { label: 'Classement conso', phases: ['Classement conso'] }
    ]}
  ];

  function renderFinaleTableau() {
    const el = document.getElementById('finale-tableau');
    const matches = appData.planning.filter(m => m.phase);
    if (!matches.length) { el.innerHTML = "<p class=\"text-center text-gray-500 italic mt-10\">La phase finale n'est pas encore définie.</p>"; return; }

    const byId = {};
    matches.forEach(m => { if (m.id) byId[m.id] = m; });

    let html = '';
    BRACKET_DEFS.forEach(bracket => {
      let bracketHtml = '';
      const visibleRounds = bracket.rounds.map(round => {
        let ms = [];
        if (round.ids) ms = round.ids.map(id => byId[id]).filter(Boolean);
        else if (round.phases) ms = matches.filter(m => round.phases.includes(m.phase));
        return { label: round.label, ms };
      }).filter(r => r.ms.length);

      visibleRounds.forEach((round, i) => {
        bracketHtml += `<div>
          <div class="text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-1.5 text-center">${round.label}</div>
          <div class="space-y-2">${round.ms.map(matchCard).join('')}</div>
        </div>`;
        if (i < visibleRounds.length - 1) {
          bracketHtml += `<div class="flex justify-center text-pastis-500 text-xl">↓</div>`;
        }
      });

      if (bracketHtml) {
        html += `<div class="mb-6 space-y-2">
          <h3 class="font-oswald font-black uppercase tracking-wide text-sm text-pastis-500 mb-1 text-center border-b border-navy-700 pb-2">${bracket.title}</h3>
          ${bracketHtml}
        </div>`;
      }
    });
    el.innerHTML = html || '<p class="text-center text-gray-500 italic mt-10">Rien à afficher pour le moment.</p>';
  }

  function renderAll() {
    buildJourneeMap();
    renderPlanning();
    renderGroupes();
    renderFinale();
    renderFinaleTableau();
    switchFinaleView(finaleView);
    populateEquipeSelect();
    renderEquipe();
  }

  // Le backend renvoie déjà "HH:mm" en texte propre — plus besoin de parser
  // de date ISO ni de gérer de fuseau horaire côté navigateur.
  function formatHeure(dt) {
    if (!dt) return '';
    return dt.toString().slice(0, 5);
  }

  function matchWinner(m) {
    if (!m.isPlayed) return null;
    if (m.scoreHome > m.scoreAway) return 'home';
    if (m.scoreHome < m.scoreAway) return 'away';
    if (m.tab) return (m.tab === m.home) ? 'home' : (m.tab === m.away ? 'away' : null);
    return null;
  }

  // Carte de match — conçue mobile d'abord : équipes empilées, rien n'est jamais tronqué.
  function matchCard(m) {
    const win = matchWinner(m);
    const clsHome = win === 'home' ? 'text-white' : (win === 'away' ? 'text-gray-500' : 'text-white');
    const clsAway = win === 'away' ? 'text-white' : (win === 'home' ? 'text-gray-500' : 'text-white');
    const wHome = win === 'home' ? 'font-black' : 'font-bold';
    const wAway = win === 'away' ? 'font-black' : 'font-bold';

    const scoreHomeTxt = m.isPlayed ? m.scoreHome : '–';
    const scoreAwayTxt = m.isPlayed ? m.scoreAway : '–';
    const scoreClsHome = m.isPlayed ? (win === 'home' ? 'bg-pastis-500 text-navy-900' : 'bg-navy-700 text-gray-300') : 'bg-navy-700 text-gray-500';
    const scoreClsAway = m.isPlayed ? (win === 'away' ? 'bg-pastis-500 text-navy-900' : 'bg-navy-700 text-gray-300') : 'bg-navy-700 text-gray-500';

    const tc = terrainColor(m.location);
    const tabTag = (m.isPlayed && m.scoreHome === m.scoreAway && m.tab)
      ? `<div class="text-[10px] text-pastis-500 uppercase font-bold mt-2 text-center">🎯 Vainqueur aux tirs au but : ${m.tab}</div>` : '';
    const pending = (!m.homeResolved || !m.awayResolved)
      ? `<div class="text-[10px] text-gray-500 italic mt-2 text-center">En attente des résultats précédents</div>` : '';
    const phaseTag = m.phase
      ? `<div class="mb-2.5"><span class="inline-block text-[10px] font-black uppercase tracking-wider text-navy-900 bg-pastis-500 px-2 py-1 rounded">${m.phase}</span></div>`
      : '';

    return `
      <div class="card p-3 shadow-sm">
        <div class="flex items-center justify-between gap-2 mb-2.5 pb-2.5 border-b border-white/10">
          <span class="inline-flex items-center gap-1.5 text-pastis-500 font-oswald font-bold text-lg flex-shrink-0">🕐 ${formatHeure(m.datetime)}</span>
          <span class="inline-flex items-center gap-1 text-[11px] font-black uppercase tracking-wide px-2.5 py-1 rounded-full text-right"
                style="background:${tc}26;border:1px solid ${tc};color:${tc}">📍 ${m.location || ''}</span>
        </div>
        ${phaseTag}
        <div class="space-y-2">
          <div class="flex items-center justify-between gap-3">
            <span class="flex items-center gap-2 text-[15px] ${wHome} ${clsHome} min-w-0">
              <span class="text-xl flex-shrink-0">${flag(m.home)}</span>
              <span class="break-words">${m.home}</span>
            </span>
            <span class="flex-shrink-0 font-oswald font-black text-base w-8 h-8 flex items-center justify-center rounded ${scoreClsHome}">${scoreHomeTxt}</span>
          </div>
          <div class="flex items-center justify-between gap-3">
            <span class="flex items-center gap-2 text-[15px] ${wAway} ${clsAway} min-w-0">
              <span class="text-xl flex-shrink-0">${flag(m.away)}</span>
              <span class="break-words">${m.away}</span>
            </span>
            <span class="flex-shrink-0 font-oswald font-black text-base w-8 h-8 flex items-center justify-center rounded ${scoreClsAway}">${scoreAwayTxt}</span>
          </div>
        </div>
        ${tabTag}${pending}
      </div>
    `;
  }

  function renderPlanning() {
    const el = document.getElementById('view-planning');
    if (!appData.planning.length) { el.innerHTML = '<p class="text-center text-gray-500 italic mt-10">Aucun match programmé.</p>'; return; }
    const sorted = [...appData.planning].sort(compareMatches);
    let lastHeure = '';
    let html = '';
    sorted.forEach(m => {
      const h = formatHeure(m.datetime);
      if (h !== lastHeure) {
        html += `<div class="text-pastis-500 font-oswald font-black uppercase tracking-wide text-base mt-5 mb-2 border-b border-navy-700 pb-1">Journée ${journeeMap[h] || ''}</div>`;
        lastHeure = h;
      }
      html += matchCard(m);
    });
    el.innerHTML = html;
  }

  function renderGroupes() {
    const el = document.getElementById('view-groupes');
    const groupes = appData.groupes || {};
    const noms = Object.keys(groupes).sort();
    if (!noms.length) { el.innerHTML = '<p class="text-center text-gray-500 italic mt-10">Aucun groupe défini.</p>'; return; }

    let html = '';
    noms.forEach(g => {
      const teams = groupes[g];
      const nbEquipes = teams.length;
      const nbQualifQuart = nbEquipes === 5 ? 3 : 2;
      html += `
        <div class="card overflow-hidden shadow-lg">
          <div class="bg-navy-900 py-2.5 px-4 border-b border-navy-700 font-oswald font-bold uppercase tracking-wide">Groupe ${g}</div>
          <div class="overflow-x-auto">
            <table class="w-full text-center text-xs whitespace-nowrap">
              <thead class="bg-navy-900/50 text-gray-400">
                <tr>
                  <th class="py-2 pl-3 text-left">#</th>
                  <th class="py-2 text-left">Équipe</th>
                  <th class="py-2 text-pastis-500">Pts</th>
                  <th class="py-2">J</th><th class="py-2">G</th><th class="py-2">N</th><th class="py-2">P</th>
                  <th class="py-2">BP</th><th class="py-2">BC</th><th class="py-2 pr-3">Diff</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-navy-700">
                ${teams.map((t, i) => {
                  const diff = t.bp - t.bc;
                  const diffCls = diff > 0 ? 'text-green-400' : (diff < 0 ? 'text-red-400' : 'text-gray-400');
                  const rowCls = i < nbQualifQuart ? 'border-l-4 border-green-500 bg-green-900/10' : 'border-l-4 border-pastis-500/60 bg-pastis-500/5';
                  return `<tr class="hover:bg-navy-700 transition ${rowCls}">
                    <td class="py-2.5 pl-3 text-left text-gray-400">${t.rang}</td>
                    <td class="py-2.5 text-left font-bold whitespace-normal">${flag(t.equipe)} ${t.equipe}</td>
                    <td class="py-2.5 font-black text-pastis-500">${t.pts}</td>
                    <td class="py-2.5 text-gray-400">${t.j}</td>
                    <td class="py-2.5 text-gray-400">${t.g}</td>
                    <td class="py-2.5 text-gray-400">${t.n}</td>
                    <td class="py-2.5 text-gray-400">${t.p}</td>
                    <td class="py-2.5 text-gray-400">${t.bp}</td>
                    <td class="py-2.5 text-gray-400">${t.bc}</td>
                    <td class="py-2.5 pr-3 font-bold ${diffCls}">${diff > 0 ? '+' + diff : diff}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          <div class="px-4 py-2.5 bg-navy-900/40 text-[10px] text-gray-400 border-t border-navy-700/50">
            ${LEGENDES_GROUPE[nbEquipes] || ''}
          </div>
        </div>
      `;
    });
    el.innerHTML = html;
  }

  // Phase finale : regroupée par HEURE (comme demandé), le tour/phase apparaît
  // comme étiquette sur chaque carte plutôt qu'en titre de section.
  function renderFinale() {
    const el = document.getElementById('finale-chrono');
    const matches = appData.planning.filter(m => m.phase);
    if (!matches.length) { el.innerHTML = "<p class=\"text-center text-gray-500 italic mt-10\">La phase finale n'est pas encore définie.</p>"; return; }

    const sorted = [...matches].sort(compareMatches);
    let html = `<div class="text-center text-[11px] text-gray-400 bg-navy-800/60 border border-navy-700/50 rounded-lg px-3 py-2.5">
      🎉 Aucune équipe n'est éliminée après les poules — tout le monde continue en Quart, Barrage ou Demi conso.
    </div>`;
    let lastHeure = '';
    sorted.forEach(m => {
      const h = formatHeure(m.datetime);
      if (h !== lastHeure) {
        html += `<div class="text-pastis-500 font-oswald font-black uppercase tracking-wide text-base mt-5 mb-2 border-b border-navy-700 pb-1">Journée ${journeeMap[h] || ''}</div>`;
        lastHeure = h;
      }
      html += matchCard(m);
    });
    el.innerHTML = html;
  }

  // Onglet "Équipe" — calendrier complet d'une équipe (poules + phase finale)
  function populateEquipeSelect() {
    const sel = document.getElementById('select-equipe');
    const groupes = appData.groupes || {};
    let teams = [];
    Object.values(groupes).forEach(list => list.forEach(t => teams.push(t.equipe)));
    teams = [...new Set(teams)].sort((a, b) => a.localeCompare(b));
    const current = sel.value;
    sel.innerHTML = '<option value="">-- Choisir une équipe --</option>' +
      teams.map(t => `<option value="${t}">${flag(t)} ${t}</option>`).join('');
    if (teams.includes(current)) sel.value = current;
  }

  function renderEquipe() {
    const team = document.getElementById('select-equipe').value;
    const container = document.getElementById('equipe-matches');
    if (!team) { container.innerHTML = '<p class="text-center text-gray-500 italic mt-10">Sélectionne une équipe pour voir son calendrier complet.</p>'; return; }

    const matches = appData.planning.filter(m => m.home === team || m.away === team).sort(compareMatches);
    if (!matches.length) { container.innerHTML = '<p class="text-center text-gray-500 italic mt-10">Aucun match trouvé pour cette équipe.</p>'; return; }
    container.innerHTML = matches.map(m => equipeMatchCard(m, team)).join('');
  }

  function equipeMatchCard(m, team) {
    const isHome = m.home === team;
    const opponent = isHome ? m.away : m.home;
    const ownScore = m.isPlayed ? (isHome ? m.scoreHome : m.scoreAway) : null;
    const oppScore = m.isPlayed ? (isHome ? m.scoreAway : m.scoreHome) : null;
    let resultCls = 'text-white';
    if (m.isPlayed) {
      if (ownScore > oppScore) resultCls = 'text-pastis-500';
      else if (ownScore < oppScore) resultCls = 'text-gray-500';
      else resultCls = 'text-gray-300';
    }
    const tc = terrainColor(m.location);
    const phaseTag = m.phase
      ? `<span class="inline-block text-[9px] font-black uppercase tracking-wider text-navy-900 bg-pastis-500 px-1.5 py-0.5 rounded mt-1">${m.phase}</span>` : '';
    const scoreDisplay = m.isPlayed ? `${ownScore} - ${oppScore}` : '–';
    const pending = (!m.homeResolved || !m.awayResolved)
      ? `<div class="text-[10px] text-gray-500 italic mt-2">En attente des résultats précédents</div>` : '';

    return `
      <div class="card p-3 shadow-sm">
        <div class="flex items-center justify-between gap-2 mb-2.5 pb-2.5 border-b border-white/10">
          <span class="inline-flex items-center gap-1.5 text-pastis-500 font-oswald font-bold text-lg">🕐 ${formatHeure(m.datetime)}</span>
          <span class="inline-flex items-center gap-1 text-[11px] font-black uppercase tracking-wide px-2.5 py-1 rounded-full"
                style="background:${tc}26;border:1px solid ${tc};color:${tc}">📍 ${m.location || ''}</span>
        </div>
        <div class="flex items-center justify-between gap-3">
          <span class="flex items-center gap-2 text-[15px] font-bold text-white min-w-0">
            <span class="text-xl flex-shrink-0">${flag(opponent)}</span>
            <span class="break-words">vs ${opponent}</span>
          </span>
          <span class="flex-shrink-0 font-oswald font-black text-lg ${resultCls}">${scoreDisplay}</span>
        </div>
        ${phaseTag}${pending}
      </div>
    `;
  }
</script>
</body>
</html>
