<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coupe du Monde Foot 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'], oswald: ['Oswald', 'sans-serif'] },
        colors: {
          // Thème "Coupe du Monde" — vert pelouse + or trophée (volontairement différent du bleu/or de Pastis Pronos)
          navy: { 900: '#081C12', 800: '#0F3320', 700: '#1C4A30' },
          pastis: { 500: '#E7B448', 600: '#C79730' }
        }
      }
    }
  };
</script>
<style>
  html, body { -webkit-tap-highlight-color: transparent; }
  body {
    background:
      radial-gradient(circle at 15% -10%, rgba(231,180,72,0.14), transparent 42%),
      radial-gradient(circle at 100% 15%, rgba(28,74,48,0.55), transparent 55%),
      #081C12;
    position: relative;
  }
  body::before {
    content: '🏆';
    position: fixed;
    font-size: 46vw;
    line-height: 1;
    opacity: 0.04;
    top: -8vw;
    right: -10vw;
    z-index: 0;
    pointer-events: none;
    transform: rotate(-12deg);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 64px);
    z-index: 0;
    pointer-events: none;
  }
  header, main, footer { position: relative; z-index: 1; }
  .card { background: #0F3320; border: 1px solid #1C4A30; border-radius: 0.9rem; }
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none; } }
  .loader { border: 4px solid #0F3320; border-top: 4px solid #E7B448; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .logo-img { display: none; }
  .logo-img.loaded { display: block; }
</style>
</head>
<body class="bg-navy-900 text-white font-sans antialiased min-h-screen">

<header class="bg-navy-900/90 backdrop-blur-md border-b border-navy-700/50 sticky top-0 z-40 shadow-lg">
  <div class="max-w-lg mx-auto px-3 pt-3 pb-2 flex items-center justify-between gap-2">
    <img id="logo-left" class="logo-img h-10 w-10 object-contain rounded-lg flex-shrink-0" alt="Logo Lykos"
         onload="this.classList.add('loaded')" onerror="this.style.display='none'">
    <h1 class="flex-1 text-center font-oswald font-black uppercase tracking-wide leading-tight">
      <span class="block text-pastis-500 text-base">🏆 Coupe du Monde</span>
      <span class="block text-white text-sm">Foot 5</span>
    </h1>
    <img id="logo-right" class="logo-img h-10 w-10 object-contain rounded-lg flex-shrink-0" alt="Logo complexe"
         onload="this.classList.add('loaded')" onerror="this.style.display='none'">
  </div>
  <div class="max-w-lg mx-auto px-3 pb-2 flex justify-center">
    <button onclick="refreshData()" class="bg-pastis-500 hover:bg-pastis-600 text-navy-900 text-xs font-bold px-3 py-1.5 rounded-full shadow transition flex items-center gap-1.5">
      🔄 Actualiser
    </button>
  </div>
  <div class="max-w-lg mx-auto px-3 pb-3">
    <div class="flex bg-navy-900/60 rounded-xl p-1 shadow-inner border border-navy-700/50 gap-1">
      <button data-tab="planning" onclick="switchTab('planning')" class="tab-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition">📅 Planning</button>
      <button data-tab="groupes" onclick="switchTab('groupes')" class="tab-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition">📊 Groupes</button>
      <button data-tab="finale" onclick="switchTab('finale')" class="tab-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-lg transition">🏆 Finale</button>
    </div>
  </div>
</header>

<main class="max-w-lg mx-auto p-3 pb-16">

  <div id="loader" class="flex flex-col items-center justify-center py-20">
    <div class="loader mb-4"></div>
    <p class="text-gray-400 text-sm">Chargement du tournoi...</p>
  </div>

  <div id="error-box" class="hidden bg-red-900/30 border border-red-700 text-red-200 text-sm p-4 rounded-xl"></div>

  <section id="view-planning" class="hidden fade-in space-y-3"></section>

  <section id="view-groupes" class="hidden fade-in space-y-5"></section>

  <section id="view-finale" class="hidden fade-in space-y-3"></section>

  <p id="last-update" class="text-center text-[10px] text-gray-500 mt-8"></p>

</main>

<script>
  // ⚠️ Colle ici l'URL de ton Web App Apps Script (se termine par /exec)
  const API_URL = 'https://script.google.com/macros/s/AKfycbwzD30O73F7rVq4Z2oSSJMVEmPJcc3AkaPfNo6jN5egnxeLwQJowxMNYWbhLzA7AXhX8w/exec';

  // ⚠️ Colle ici tes URLs de logos (même méthode que sur Pastis Pronos :
  // héberge l'image sur Google Drive, partage "Tout le monde avec le lien",
  // puis utilise https://lh3.googleusercontent.com/d/TON_ID_FICHIER)
  const LOGO_LEFT_URL = 'https://lh3.googleusercontent.com/d/1Nf3045OYK-sjzYePgf_WzCkGV3dwrxy8';  // logo Lykos
  const LOGO_RIGHT_URL = 'https://lh3.googleusercontent.com/rd-d/ALs6j_FgjmA0rCzx_K7oHRKPxj4M98yICz3L-NYfmYLYxK65bWG2DHgSZk1eQmrcB16VmdhTaBoex5d6LB31SXIAiqXdvsT5qqNmQNTW6BNEL3e9JHfL-soU04P-7-8EwVosZr70TDeY7ewxyAcdTikIgzpOXGkFHqcSgaAAZ2SggsyKjFvEYRZlwI_51OHY4IGkMkPHqnqTftJdBx0_Vf7RLtqYfrJo6rUc4j6Y7QYkt2LsBoCIaGc5ABrl_UQ6p0Hbnlbb4_09pR6Gs0zi0JR7FzKpawd0ZkMA4aTu25mV1fXVi-cQQKEMOARmPia4fKbiMqizp0wD1lauwdWvPAgSawVRaZqG-jKNexGZTsPn6hAOuNpj-isZ1H56OwcYG52IbXqlpQFZiwKqUDugqW6gkGFtbmDIpj2T35nhLwF8vXQynbTEsVh2L53H-6Jn5liAwy7oxtsodnO0GjODoQeHXZUGC77gTDeK5wuaVUjTv0mgyR53h5yBCtShxf0xGSO5m9iNDCNZ_9XGh_cBpiC57JONrkKRM0b8qCbm0PGOKS9jvDsJ9Y4J_LeRrFqWBnwE9TQIZkttlD0E9rybUDh8cyJkJFAVWf6rgJc5ru-tM34xop1XTybgv3w-Fd_jGmn7jDm4PWn6QaYxLmp32iOOY_2N3Xko-X5iEL1B5fos5d-f9kdW3QvCaQxT-f6shFPvlN6CBr8Rne6noBPNIAktPxnfzbs9c90h4p_ab6Nb5TZjVsqGquriWYHD1yO9P9BNSawWlbb8tSqslBfa5dZMEoPYlPfp2nqySoENDzZ5XewAAf521vKqE_LJogQfqfaT4nH4K8N_u_zhSCf3QFmNJjfrcv3s7fQ67pvyUoBlNdbjKNtU2K98qX2aavu9nojUZXh_c5mR-olI0jXpvhJbqH9903EN4EQjEI1-YYj-IbjQmfOLAgRmXuNCylioESMyRQ8MUUO5PP9z8_OpBomtRwigjvpeVnvwTOZLyKH1Azj_JcY0uWBYhNxouYg8dI3bZkoeQOwOTRZmJy2fudEf_ns-hyw81qMRinIiEdkIAPxc28IR3CgUcrI-fXLoAGI7TWKh13Dgw1q2oBy0HzHv=s1600'; // logo du complexe futsal (Salon-de-Provence)

  let appData = { planning: [], groupes: {} };
  let currentTab = 'planning';

  const FLAGS = {
    'Italie': '🇮🇹', 'Allemagne': '🇩🇪', 'Portugal': '🇵🇹', 'France': '🇫🇷', 'Espagne': '🇪🇸',
    'Belgique': '🇧🇪', 'Brésil': '🇧🇷', 'Pays-Bas': '🇳🇱', 'Maroc': '🇲🇦', 'Croatie': '🇭🇷',
    'Colombie': '🇨🇴', 'Sénégal': '🇸🇳', 'Angleterre': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Argentine': '🇦🇷'
  };
  function flag(nom) { return FLAGS[nom] || ''; }

  // Légende "qui va où" après les poules — dépend du nombre d'équipes du groupe
  const LEGENDES_GROUPE = {
    5: "1er, 2e, 3e → Quarts de finale · 4e → Demi conso · 5e → Barrage consolante",
    4: "1er, 2e → Quarts de finale · 3e, 4e → Barrage consolante"
  };

  // Couleur stable par terrain (peu importe le nombre de terrains utilisés)
  const TERRAIN_PALETTE = ['#4FA3D1', '#E8834B', '#9B6BD1', '#4BBF8C', '#D14F8C', '#6B8ED1'];
  function terrainColor(nom) {
    if (!nom) return TERRAIN_PALETTE[0];
    let h = 0;
    for (let i = 0; i < nom.length; i++) h = (h * 31 + nom.charCodeAt(i)) >>> 0;
    return TERRAIN_PALETTE[h % TERRAIN_PALETTE.length];
  }

  window.onload = () => {
    if (LOGO_LEFT_URL) document.getElementById('logo-left').src = LOGO_LEFT_URL;
    if (LOGO_RIGHT_URL) document.getElementById('logo-right').src = LOGO_RIGHT_URL;
    fetchData();
  };

  function fetchData() {
    if (!API_URL) {
      showError("L'URL de l'API n'est pas configurée. Ouvre index.html et remplace API_URL par l'URL de ton déploiement Apps Script.");
      return;
    }
    fetch(API_URL + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (data.error) { showError('Erreur côté script : ' + data.message); return; }
        appData = data;
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('error-box').classList.add('hidden');
        renderAll();
        switchTab(currentTab);
        const d = new Date(data.updated);
        document.getElementById('last-update').textContent = 'Dernière mise à jour : ' + d.toLocaleTimeString('fr-FR');
      })
      .catch(err => showError('Impossible de contacter le tournoi. Vérifie ta connexion. (' + err.message + ')'));
  }

  function refreshData() {
    document.getElementById('loader').classList.remove('hidden');
    fetchData();
  }

  function showError(msg) {
    document.getElementById('loader').classList.add('hidden');
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.remove('hidden');
  }

  function switchTab(tab) {
    currentTab = tab;
    ['planning', 'groupes', 'finale'].forEach(t => {
      document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
    });
    document.querySelectorAll('.tab-btn').forEach(b => {
      const active = b.dataset.tab === tab;
      b.classList.toggle('bg-pastis-500', active);
      b.classList.toggle('text-navy-900', active);
      b.classList.toggle('font-black', active);
      b.classList.toggle('text-gray-400', !active);
    });
  }

  function renderAll() {
    renderPlanning();
    renderGroupes();
    renderFinale();
  }

  // Le backend renvoie déjà "HH:mm" en texte propre — plus besoin de parser
  // de date ISO ni de gérer de fuseau horaire côté navigateur.
  function formatHeure(dt) {
    if (!dt) return '';
    return dt.toString().slice(0, 5);
  }

  function matchWinner(m) {
    if (!m.isPlayed) return null;
    if (m.scoreHome > m.scoreAway) return 'home';
    if (m.scoreHome < m.scoreAway) return 'away';
    if (m.tab) return (m.tab === m.home) ? 'home' : (m.tab === m.away ? 'away' : null);
    return null;
  }

  // Carte de match — conçue mobile d'abord : équipes empilées, rien n'est jamais tronqué.
  function matchCard(m) {
    const win = matchWinner(m);
    const clsHome = win === 'home' ? 'text-white' : (win === 'away' ? 'text-gray-500' : 'text-white');
    const clsAway = win === 'away' ? 'text-white' : (win === 'home' ? 'text-gray-500' : 'text-white');
    const wHome = win === 'home' ? 'font-black' : 'font-bold';
    const wAway = win === 'away' ? 'font-black' : 'font-bold';

    const scoreHomeTxt = m.isPlayed ? m.scoreHome : '–';
    const scoreAwayTxt = m.isPlayed ? m.scoreAway : '–';
    const scoreClsHome = m.isPlayed ? (win === 'home' ? 'bg-pastis-500 text-navy-900' : 'bg-navy-700 text-gray-300') : 'bg-navy-700 text-gray-500';
    const scoreClsAway = m.isPlayed ? (win === 'away' ? 'bg-pastis-500 text-navy-900' : 'bg-navy-700 text-gray-300') : 'bg-navy-700 text-gray-500';

    const tc = terrainColor(m.location);
    const tabTag = (m.isPlayed && m.scoreHome === m.scoreAway && m.tab)
      ? `<div class="text-[10px] text-pastis-500 uppercase font-bold mt-2 text-center">🎯 Vainqueur aux tirs au but : ${m.tab}</div>` : '';
    const pending = (!m.homeResolved || !m.awayResolved)
      ? `<div class="text-[10px] text-gray-500 italic mt-2 text-center">En attente des résultats précédents</div>` : '';
    const phaseTag = m.phase
      ? `<div class="mb-2.5"><span class="inline-block text-[10px] font-black uppercase tracking-wider text-navy-900 bg-pastis-500 px-2 py-1 rounded">${m.phase}</span></div>`
      : '';

    return `
      <div class="card p-3 shadow-sm">
        <div class="flex items-center justify-between gap-2 mb-2.5 pb-2.5 border-b border-white/10">
          <span class="inline-flex items-center gap-1.5 text-pastis-500 font-oswald font-bold text-lg flex-shrink-0">🕐 ${formatHeure(m.datetime)}</span>
          <span class="inline-flex items-center gap-1 text-[11px] font-black uppercase tracking-wide px-2.5 py-1 rounded-full text-right"
                style="background:${tc}26;border:1px solid ${tc};color:${tc}">📍 ${m.location || ''}</span>
        </div>
        ${phaseTag}
        <div class="space-y-2">
          <div class="flex items-center justify-between gap-3">
            <span class="flex items-center gap-2 text-[15px] ${wHome} ${clsHome} min-w-0">
              <span class="text-xl flex-shrink-0">${flag(m.home)}</span>
              <span class="break-words">${m.home}</span>
            </span>
            <span class="flex-shrink-0 font-oswald font-black text-base w-8 h-8 flex items-center justify-center rounded ${scoreClsHome}">${scoreHomeTxt}</span>
          </div>
          <div class="flex items-center justify-between gap-3">
            <span class="flex items-center gap-2 text-[15px] ${wAway} ${clsAway} min-w-0">
              <span class="text-xl flex-shrink-0">${flag(m.away)}</span>
              <span class="break-words">${m.away}</span>
            </span>
            <span class="flex-shrink-0 font-oswald font-black text-base w-8 h-8 flex items-center justify-center rounded ${scoreClsAway}">${scoreAwayTxt}</span>
          </div>
        </div>
        ${tabTag}${pending}
      </div>
    `;
  }

  function renderPlanning() {
    const el = document.getElementById('view-planning');
    if (!appData.planning.length) { el.innerHTML = '<p class="text-center text-gray-500 italic mt-10">Aucun match programmé.</p>'; return; }
    const sorted = [...appData.planning].sort((a, b) => formatHeure(a.datetime).localeCompare(formatHeure(b.datetime)));
    let lastHeure = '';
    let html = '';
    sorted.forEach(m => {
      const h = formatHeure(m.datetime);
      if (h !== lastHeure) {
        html += `<div class="text-pastis-500 font-oswald font-black uppercase tracking-wide text-base mt-5 mb-2 border-b border-navy-700 pb-1">🕐 ${h}</div>`;
        lastHeure = h;
      }
      html += matchCard(m);
    });
    el.innerHTML = html;
  }

  function renderGroupes() {
    const el = document.getElementById('view-groupes');
    const groupes = appData.groupes || {};
    const noms = Object.keys(groupes).sort();
    if (!noms.length) { el.innerHTML = '<p class="text-center text-gray-500 italic mt-10">Aucun groupe défini.</p>'; return; }

    let html = '';
    noms.forEach(g => {
      const teams = groupes[g];
      const nbEquipes = teams.length;
      const nbQualifQuart = nbEquipes === 5 ? 3 : 2;
      html += `
        <div class="card overflow-hidden shadow-lg">
          <div class="bg-navy-900 py-2.5 px-4 border-b border-navy-700 font-oswald font-bold uppercase tracking-wide">Groupe ${g}</div>
          <div class="overflow-x-auto">
            <table class="w-full text-center text-xs whitespace-nowrap">
              <thead class="bg-navy-900/50 text-gray-400">
                <tr>
                  <th class="py-2 pl-3 text-left">#</th>
                  <th class="py-2 text-left">Équipe</th>
                  <th class="py-2 text-pastis-500">Pts</th>
                  <th class="py-2">J</th><th class="py-2">G</th><th class="py-2">N</th><th class="py-2">P</th>
                  <th class="py-2">BP</th><th class="py-2">BC</th><th class="py-2 pr-3">Diff</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-navy-700">
                ${teams.map((t, i) => {
                  const diff = t.bp - t.bc;
                  const diffCls = diff > 0 ? 'text-green-400' : (diff < 0 ? 'text-red-400' : 'text-gray-400');
                  const rowCls = i < nbQualifQuart ? 'border-l-4 border-green-500 bg-green-900/10' : 'border-l-4 border-pastis-500/60 bg-pastis-500/5';
                  return `<tr class="hover:bg-navy-700 transition ${rowCls}">
                    <td class="py-2.5 pl-3 text-left text-gray-400">${t.rang}</td>
                    <td class="py-2.5 text-left font-bold whitespace-normal">${flag(t.equipe)} ${t.equipe}</td>
                    <td class="py-2.5 font-black text-pastis-500">${t.pts}</td>
                    <td class="py-2.5 text-gray-400">${t.j}</td>
                    <td class="py-2.5 text-gray-400">${t.g}</td>
                    <td class="py-2.5 text-gray-400">${t.n}</td>
                    <td class="py-2.5 text-gray-400">${t.p}</td>
                    <td class="py-2.5 text-gray-400">${t.bp}</td>
                    <td class="py-2.5 text-gray-400">${t.bc}</td>
                    <td class="py-2.5 pr-3 font-bold ${diffCls}">${diff > 0 ? '+' + diff : diff}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          <div class="px-4 py-2.5 bg-navy-900/40 text-[10px] text-gray-400 border-t border-navy-700/50">
            ${LEGENDES_GROUPE[nbEquipes] || ''}
          </div>
        </div>
      `;
    });
    el.innerHTML = html;
  }

  // Phase finale : regroupée par HEURE (comme demandé), le tour/phase apparaît
  // comme étiquette sur chaque carte plutôt qu'en titre de section.
  function renderFinale() {
    const el = document.getElementById('view-finale');
    const matches = appData.planning.filter(m => m.phase);
    if (!matches.length) { el.innerHTML = "<p class=\"text-center text-gray-500 italic mt-10\">La phase finale n'est pas encore définie.</p>"; return; }

    const sorted = [...matches].sort((a, b) => formatHeure(a.datetime).localeCompare(formatHeure(b.datetime)));
    let html = `<div class="text-center text-[11px] text-gray-400 bg-navy-800/60 border border-navy-700/50 rounded-lg px-3 py-2.5">
      🎉 Aucune équipe n'est éliminée après les poules — tout le monde continue en Quart, Barrage ou Demi conso.
    </div>`;
    let lastHeure = '';
    sorted.forEach(m => {
      const h = formatHeure(m.datetime);
      if (h !== lastHeure) {
        html += `<div class="text-pastis-500 font-oswald font-black uppercase tracking-wide text-base mt-5 mb-2 border-b border-navy-700 pb-1">🕐 ${h}</div>`;
        lastHeure = h;
      }
      html += matchCard(m);
    });
    el.innerHTML = html;
  }
</script>
</body>
</html>
